# ============================================================================
# TaskGuard — Pipeline DevSecOps (GitLab CI/CD)
# ============================================================================

stages:
  - lint
  - test
  - security
  - build
  - dast
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHON_IMAGE: "python:3.12-slim"

  # Docker-in-Docker
  DOCKER_HOST: "tcp://docker:2376"
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_TLS_VERIFY: "1"
  DOCKER_CERT_PATH: "/certs/client"

  IMAGE_LOCAL: "taskguard:ci"
  ZAP_NET: "taskguard-ci-net"

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

.python_cache: &python_cache
  cache:
    key:
      files:
        - requirements-dev.txt
    paths:
      - .cache/pip

# ---------------------------------------------------------------------------
# LINT
# ---------------------------------------------------------------------------
lint:
  stage: lint
  image: $PYTHON_IMAGE

  <<: *python_cache

  before_script:
    - pip install -r requirements-dev.txt

  script:
    - flake8 app run.py config.py scripts/init_db.py

# ---------------------------------------------------------------------------
# TEST
# ---------------------------------------------------------------------------
test:
  stage: test
  image: $PYTHON_IMAGE

  <<: *python_cache

  variables:
    FLASK_CONFIG: testing
    SECRET_KEY: ci-test-secret

  before_script:
    - pip install -r requirements-dev.txt

  script:
    - mkdir -p reports
    - pytest --junitxml=reports/junit.xml --cov=app --cov-report=xml:reports/coverage.xml

  coverage: '/TOTAL.+ ([0-9]{1,3}%)/'

  artifacts:
    when: always
    expire_in: 1 week

    paths:
      - reports/

    reports:
      junit: reports/junit.xml

      coverage_report:
        coverage_format: cobertura
        path: reports/coverage.xml

# ---------------------------------------------------------------------------
# SAST
# ---------------------------------------------------------------------------
sast:
  stage: security
  image: $PYTHON_IMAGE

  before_script:
    - pip install "bandit[toml]==1.7.9"

  script:
    - mkdir -p reports
    - bandit -r app run.py config.py -f sarif -o reports/bandit.sarif || true
    - bash scripts/run_sast.sh

  artifacts:
    when: always
    expire_in: 1 week

    paths:
      - reports/

    reports:
      sast: reports/bandit.sarif

# ---------------------------------------------------------------------------
# DEPENDENCY CHECK
# ---------------------------------------------------------------------------
dependency-check:
  stage: security

  image:
    name: owasp/dependency-check:latest
    entrypoint: [""]

  cache:
    key: dependency-check-nvd

    paths:
      - dependency-check-data/

  script:
    - mkdir -p reports dependency-check-data

    - |
      ARGS="--scan . \
      --project TaskGuard \
      --format HTML \
      --format JSON \
      --format SARIF \
      --out reports \
      --data dependency-check-data \
      --failOnCVSS 7 \
      --enableExperimental \
      --suppression pipeline/dependency-check/suppression.xml"

      if [ -n "${NVD_API_KEY:-}" ]; then
        ARGS="$ARGS --nvdApiKey ${NVD_API_KEY}"
      fi

      /usr/share/dependency-check/bin/dependency-check.sh $ARGS

  artifacts:
    when: always
    expire_in: 1 week

    paths:
      - reports/

# ---------------------------------------------------------------------------
# DOCKER BUILD
# ---------------------------------------------------------------------------
docker-build:
  stage: build

  image: docker:27

  services:
    - docker:27-dind

  script:
    - docker build -t "$IMAGE_LOCAL" .
    - docker save "$IMAGE_LOCAL" | gzip > taskguard-ci.tar.gz

  artifacts:
    expire_in: 1 week

    paths:
      - taskguard-ci.tar.gz

# ---------------------------------------------------------------------------
# DAST
# ---------------------------------------------------------------------------
dast:
  stage: dast

  image: docker:27

  services:
    - docker:27-dind

  needs:
    - docker-build

  script:
    - docker load < taskguard-ci.tar.gz
    - docker network create "$ZAP_NET"

    - |
      docker run -d \
        --name taskguard-web \
        --network "$ZAP_NET" \
        -e SECRET_KEY=ci-dast-secret \
        -e FLASK_CONFIG=production \
        "$IMAGE_LOCAL"

    - |
      echo "Aguardando aplicação..."
      for i in $(seq 1 40); do
        if docker run --rm --network "$ZAP_NET" curlimages/curl:8.8.0 \
          -fsS http://taskguard-web:8000/health >/dev/null 2>&1; then
          echo "Aplicação saudável."
          break
        fi
        sleep 3
      done

    - mkdir -p reports

    - |
      # SOLUÇÃO PARA O DIND: Ligar o container primeiro e copiar as regras ao vivo.
      docker run -d --name zap --network "$ZAP_NET" --entrypoint /bin/sh ghcr.io/zaproxy/zaproxy:stable -c "tail -f /dev/null"
      
      sleep 2
      docker cp pipeline/zap/rules.tsv zap:/zap/wrk/rules.tsv
      
      set +e
      docker exec zap zap-baseline.py -t http://taskguard-web:8000 -c rules.tsv -r zap-report.html -J zap-report.json -I
      ZAP_EXIT=$?
      set -e

      docker cp zap:/zap/wrk/zap-report.html reports/ 2>/dev/null || true
      docker cp zap:/zap/wrk/zap-report.json reports/ 2>/dev/null || true

      docker rm -f zap >/dev/null 2>&1 || true
      docker rm -f taskguard-web >/dev/null 2>&1 || true
      docker network rm "$ZAP_NET" >/dev/null 2>&1 || true

      if [ "$ZAP_EXIT" -eq 1 ]; then
        echo "OWASP ZAP encontrou vulnerabilidades FAIL."
        exit 1
      fi
      echo "DAST concluído."

  artifacts:
    when: always
    expire_in: 1 week

    paths:
      - reports/

# ---------------------------------------------------------------------------
# DEPLOY
# ---------------------------------------------------------------------------
deploy-stage:
  stage: deploy

  image: alpine:3.20

  environment:
    name: staging

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

  script:
    - echo "Todas as verificações passaram."
    - echo "Promovendo imagem para staging."
    - echo "Deploy concluído."
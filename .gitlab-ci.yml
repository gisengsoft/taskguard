# ============================================================================
# TaskGuard — Pipeline DevSecOps (GitLab CI/CD)
#
# Fluxo de estágios (jobs de segurança rodam em paralelo no estágio "security"):
#
#   lint ─> test ─> [sast | dependency-check] ─> docker-build ─> dast ─> deploy
#
# A pipeline FALHA automaticamente em:
#   • erros de lint (flake8)
#   • testes quebrados ou cobertura < 80%
#   • vulnerabilidade ALTA no SAST (Bandit)
#   • dependência com CVSS >= 7 (OWASP Dependency-Check)
#   • alerta FAIL no DAST (OWASP ZAP)
# ============================================================================

stages:
  - lint
  - test
  - security
  - build
  - dast
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHON_IMAGE: "python:3.12-slim"
  # Docker-in-Docker (usado nos estágios de build e DAST).
  DOCKER_HOST: "tcp://docker:2376"
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_TLS_VERIFY: "1"
  DOCKER_CERT_PATH: "/certs/client"
  IMAGE_LOCAL: "taskguard:ci"
  ZAP_NET: "taskguard-ci-net"

# Executa em pushes para main/develop e em merge requests.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# Cache de pip reutilizado entre jobs Python.
.python_cache: &python_cache
  cache:
    key:
      files:
        - requirements-dev.txt
    paths:
      - .cache/pip

# --------------------------------------------------------------------------- #
# 1) LINT — qualidade de código (flake8)
# --------------------------------------------------------------------------- #
lint:
  stage: lint
  image: $PYTHON_IMAGE
  <<: *python_cache
  before_script:
    - pip install -r requirements-dev.txt
  script:
    - flake8 app run.py config.py scripts/init_db.py

# --------------------------------------------------------------------------- #
# 2) TEST — testes automatizados + cobertura (gate de 80%)
# --------------------------------------------------------------------------- #
test:
  stage: test
  image: $PYTHON_IMAGE
  <<: *python_cache
  variables:
    FLASK_CONFIG: testing
    SECRET_KEY: ci-test-secret
  before_script:
    - pip install -r requirements-dev.txt
  script:
    # A config "testing" usa SQLite em memória (isolado e descartável).
    - pytest --junitxml=reports/junit.xml
  coverage: '/^TOTAL.*\s+(\d+)%/'
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - reports/
    reports:
      junit: reports/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: reports/coverage.xml

# --------------------------------------------------------------------------- #
# 3) SAST — análise estática de segurança (Bandit)
# --------------------------------------------------------------------------- #
sast:
  stage: security
  image: $PYTHON_IMAGE
  before_script:
    - pip install "bandit[toml]==1.7.9"
  script:
    - mkdir -p reports
    # Relatório SARIF (consumível pelo dashboard de segurança do GitLab Ultimate).
    - bandit -r app run.py config.py -c pyproject.toml -f sarif -o reports/bandit.sarif || true
    # Gate: falha se houver issue de severidade ALTA.
    - bash scripts/run_sast.sh
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - reports/
    reports:
      sast: reports/bandit.sarif

# --------------------------------------------------------------------------- #
# 4) DEPENDENCY-CHECK — análise de composição / SCA (OWASP Dependency-Check)
# --------------------------------------------------------------------------- #
dependency-check:
  stage: security
  image:
    name: owasp/dependency-check:latest
    entrypoint: [""]
  # Cacheia a base de CVEs (NVD) entre execuções; o primeiro run é lento.
  cache:
    key: dependency-check-nvd
    paths:
      - dependency-check-data/
  script:
    - mkdir -p reports dependency-check-data
    - |
      ARGS="--scan . --project TaskGuard \
            --format HTML --format JSON --format SARIF \
            --out reports --data dependency-check-data \
            --failOnCVSS 7 --enableExperimental \
            --suppression pipeline/dependency-check/suppression.xml"
      # NVD_API_KEY (variável de CI/CD, opcional) acelera muito o download.
      if [ -n "${NVD_API_KEY:-}" ]; then ARGS="$ARGS --nvdApiKey ${NVD_API_KEY}"; fi
      /usr/share/dependency-check/bin/dependency-check.sh $ARGS
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - reports/
    reports:
      dependency_scanning: reports/dependency-check-report.sarif

# --------------------------------------------------------------------------- #
# 5) DOCKER-BUILD — build da imagem (Docker-in-Docker)
# --------------------------------------------------------------------------- #
docker-build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  script:
    - docker build -t "$IMAGE_LOCAL" .
    - docker save "$IMAGE_LOCAL" | gzip > taskguard-ci.tar.gz
  artifacts:
    expire_in: 1 week
    paths:
      - taskguard-ci.tar.gz

# --------------------------------------------------------------------------- #
# 6) DAST — varredura dinâmica (OWASP ZAP Baseline)
#
# App e ZAP rodam na MESMA rede Docker; o ZAP alcança a aplicação pelo nome
# DNS 'taskguard-web' (e NÃO por localhost). Como em DinD os bind-mounts
# apontam para o daemon e não para o job, os relatórios são extraídos com
# 'docker cp' (padrão robusto para GitLab + DinD).
# --------------------------------------------------------------------------- #
dast:
  stage: dast
  image: docker:27
  services:
    - docker:27-dind
  needs:
    - docker-build
  script:
    - docker load < taskguard-ci.tar.gz
    - docker network create "$ZAP_NET"
    - docker run -d --name taskguard-web --network "$ZAP_NET" \
        -e SECRET_KEY=ci-dast-secret -e FLASK_CONFIG=production \
        "$IMAGE_LOCAL"
    - |
      echo "Aguardando health check da aplicação..."
      for i in $(seq 1 40); do
        if docker run --rm --network "$ZAP_NET" curlimages/curl:8.8.0 \
             -fsS http://taskguard-web:8000/health >/dev/null 2>&1; then
          echo "Aplicação saudável."; break
        fi
        sleep 3
      done
    - mkdir -p reports
    - |
      # Cria o container do ZAP, injeta as regras via docker cp e executa.
      docker create --name zap --network "$ZAP_NET" \
        ghcr.io/zaproxy/zaproxy:stable \
        zap-baseline.py -t http://taskguard-web:8000 \
          -c rules.tsv -r zap-report.html -J zap-report.json -I
      docker cp pipeline/zap/rules.tsv zap:/zap/wrk/rules.tsv
      set +e
      docker start -a zap
      ZAP_EXIT=$?
      set -e
      docker cp zap:/zap/wrk/zap-report.html reports/ 2>/dev/null || true
      docker cp zap:/zap/wrk/zap-report.json reports/ 2>/dev/null || true
      docker rm -f zap >/dev/null 2>&1 || true
      docker rm -f taskguard-web >/dev/null 2>&1 || true
      docker network rm "$ZAP_NET" >/dev/null 2>&1 || true
      # Exit 1 do Baseline = ao menos uma regra marcada como FAIL.
      if [ "$ZAP_EXIT" -eq 1 ]; then
        echo "OWASP ZAP encontrou alertas classificados como FAIL."; exit 1
      fi
      echo "DAST concluído (exit ZAP=$ZAP_EXIT)."
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - reports/

# --------------------------------------------------------------------------- #
# 7) DEPLOY — promoção a staging (somente na branch main)
# --------------------------------------------------------------------------- #
deploy-stage:
  stage: deploy
  image: alpine:3.20
  environment:
    name: staging
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - echo "==> Todas as verificações de segurança passaram."
    - echo "==> Promovendo a imagem $IMAGE_LOCAL para o ambiente de staging."
    - echo "==> (Placeholder) Aqui entraria o push para o registry e o"
    - echo "    'kubectl rollout' / 'docker stack deploy' do seu ambiente."
    - echo "==> Deploy concluído com sucesso."
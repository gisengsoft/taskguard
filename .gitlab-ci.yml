stages:
  - lint
  - test
  - security
  - build
  - dast
  - deploy

# -------------------------
# LINT
# -------------------------
lint:
  stage: lint
  image: python:3.10-slim
  script:
    - pip install flake8
    - flake8 app run.py

# -------------------------
# TEST
# -------------------------
test:
  stage: test
  image: python:3.10-slim
  script:
    - pip install -r requirements.txt
    - pip install -r requirements-dev.txt
    - pytest -q

# -------------------------
# SECURITY (SAST + SCA separados corretamente)
# -------------------------

sast:
  stage: security
  image: python:3.10-slim
  script:
    - pip install bandit
    - bandit -r app -f json -o bandit.json || true
  artifacts:
    paths:
      - bandit.json

dependency-check:
  stage: security
  image:
    name: owasp/dependency-check:latest
    entrypoint: [""]
  script:
    - mkdir -p reports
    - /usr/share/dependency-check/bin/dependency-check.sh
      --scan .
      --project TaskGuard
      --format HTML
      --out reports || true
  artifacts:
    paths:
      - reports/

# -------------------------
# BUILD
# -------------------------
build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t taskguard .

# -------------------------
# DAST
# -------------------------
dast:
  stage: dast
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t taskguard .
    - docker run -d -p 8000:8000 --name app taskguard
    - sleep 15
    - docker run --rm --network host zaproxy/zap-stable
      zap-baseline.py -t http://localhost:8000 -r zap.html || true
  artifacts:
    paths:
      - zap.html

# -------------------------
# DEPLOY (simulado)
# -------------------------
deploy-stage:
  stage: deploy
  script:
    - echo "Deploy stage OK"
[pytest]
# ============================================================================
# Configuração do pytest para o TaskGuard.
# ============================================================================
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Cobertura: mede o pacote app/, exige mínimo de 80% e gera relatórios
# em terminal, HTML e XML (este último consumido pela pipeline).
addopts =
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-report=html:reports/coverage-html
    --cov-report=xml:reports/coverage.xml
    --cov-fail-under=80

filterwarnings =
    ignore::DeprecationWarning

@version: 4.5
# ============================================================================
# Configuração do coletor syslog-ng do TaskGuard.
# Recebe eventos via UDP/514 da aplicação e os persiste em /var/log/central.
# ============================================================================

options {
    chain_hostnames(off);
    flush_lines(0);
    use_dns(no);
    use_fqdn(no);
    keep_hostname(yes);
    create_dirs(yes);
};

# Fontes: socket interno + rede (UDP e TCP) na porta 514.
source s_network {
    network(transport("udp") port(514));
    network(transport("tcp") port(514));
    internal();
};

# Destino: arquivo central com todas as mensagens recebidas.
destination d_central {
    file("/var/log/central/taskguard.log"
         template("$ISODATE $HOST $MSGHDR$MSG\n"));
};

# Destino dedicado para eventos de segurança do TaskGuard.
destination d_security {
    file("/var/log/central/security.log"
         template("$ISODATE $HOST $MSGHDR$MSG\n"));
};

filter f_security {
    message("TASKGUARD-SECURITY");
};

log { source(s_network); destination(d_central); };
log { source(s_network); filter(f_security); destination(d_security); };

# ============================================================================
# Filtro Fail2Ban para o TaskGuard.
#
# Casa as linhas de falha de autenticação emitidas pelo logger de segurança
# (ver app/logging_config.py). O formato é estável e previsível:
#
#   <data> TASKGUARD-SECURITY WARNING event=login_failed ip=1.2.3.4 user=... detail=...
#
# O grupo <HOST> é o endereço que o Fail2Ban irá banir.
# ============================================================================
[Definition]

# Eventos que indicam tentativa maliciosa de autenticação ou abuso.
failregex = ^.*TASKGUARD-SECURITY\s+\S+\s+event=login_failed\s+ip=<HOST>\s.*$
            ^.*TASKGUARD-SECURITY\s+\S+\s+event=account_locked\s+ip=<HOST>\s.*$
            ^.*TASKGUARD-SECURITY\s+\S+\s+event=rate_limit_exceeded\s+ip=<HOST>\s.*$
            ^.*TASKGUARD-SECURITY\s+\S+\s+event=idor_attempt\s+ip=<HOST>\s.*$

# Linhas que NÃO devem ser consideradas falha (ex.: logins bem-sucedidos).
ignoreregex = ^.*event=login_success.*$

# Suporte ao timestamp ISO usado pela aplicação.
datepattern = ^%%Y-%%m-%%d %%H:%%M:%%S

env:
  contexts:
  - excludePaths: []
    name: baseline
    urls:
    - http://web:8000
  parameters:
    failOnError: true
    progressToStdout: false
jobs:
- parameters:
    enableTags: false
    maxAlertsPerRule: 10
  type: passiveScan-config
- parameters:
    maxDuration: 1
    url: http://web:8000
  type: spider
- parameters:
    maxDuration: 0
  type: passiveScan-wait
- parameters:
    format: Long
    summaryFile: /home/zap/zap_out.json
  rules:
  - action: FAIL
    customMessage: ''
    id: 10202
  - action: FAIL
    customMessage: ''
    id: 40012
  - action: FAIL
    customMessage: ''
    id: 40014
  - action: FAIL
    customMessage: ''
    id: 40018
  - action: FAIL
    customMessage: ''
    id: 90020
  - action: FAIL
    customMessage: ''
    id: 40003
  - action: WARN
    customMessage: ''
    id: 10038
  - action: WARN
    customMessage: ''
    id: 10063
  - action: IGNORE
    customMessage: ''
    id: 10096
  - action: IGNORE
    customMessage: ''
    id: 10027
  - action: IGNORE
    customMessage: ''
    id: 10109
  type: outputSummary
- parameters:
    reportDescription: ''
    reportDir: /zap/wrk/
    reportFile: zap-report.html
    reportTitle: ZAP Scanning Report
    template: traditional-html
  type: report
- parameters:
    reportDescription: ''
    reportDir: /zap/wrk/
    reportFile: zap-report.json
    reportTitle: ZAP Scanning Report
    template: traditional-json
  type: report
